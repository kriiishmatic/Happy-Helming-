spec:
  containers:
    - name: {{ .Values.component.name }}
      image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
      imagePullPolicy: IfNotPresent

      livenessProbe:
        httpGet:
          path: /health
          port: {{ .Values.ports.containerPort }}
        initialDelaySeconds: 10
        periodSeconds: 10
        failureThreshold: 3

      readinessProbe:
        httpGet:
          path: /health
          port: {{ .Values.ports.containerPort }}
        initialDelaySeconds: 10
        periodSeconds: 10
        failureThreshold: 3

      startupProbe:
        httpGet:
          path: /health
          port: {{ .Values.ports.containerPort }}
        failureThreshold: 30
        periodSeconds: 10

      ports:
        - containerPort: {{ .Values.ports.containerPort }}

      resources:
        {{- toYaml .Values.resources | nindent 8 }}

      volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf

  volumes:
    - name: nginx-config
      configMap:
        name: {{ .Values.component.name }}