component :
  name : payment
  environment: dev
  namespace: roboshop
  replicas: 1

image:
  repository: "854481201869.dkr.ecr.us-east-1.amazonaws.com/stackly/payment"
  tag: "1.0.0"

endpoints:
  CART_HOST: "cart"
  CART_PORT: "8080"
  USER_HOST: "user"
