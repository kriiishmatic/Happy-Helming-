component :
  name : cart
  environment: dev
  namespace: roboshop
  replicas: 1

image:
  repository: "854481201869.dkr.ecr.us-east-1.amazonaws.com/stackly/cart"
  tag: "1.0.0"

endpoints:
  REDIS_HOST = "redis"
  CATALOGUE_HOST= "catalogue"
###### PORTS #######
ports :
  containerPort: 8080
  servicePort: 8080
  


### Resource limits and requests for the catalogue component#####
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

  ###### PORTS #######
  ports :
   containerPort: 8080
   servicePort: 8080
   