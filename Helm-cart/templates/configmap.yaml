apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.component.name }}
  namespace: {{ .Values.component.namespace }}
  labels:
    name: {{ .Values.component.name }}
    project: {{ .Values.component.namespace }}
    environment: {{ .Values.component.environment }}
    tier: backend
data:
  REDIS_HOST: {{ .Values.endpoints.REDIS_HOST }}
  CATALOGUE_HOST: {{ .Values.endpoints.CATALOGUE_HOST }}
  CATALOGUE_PORT: 8080